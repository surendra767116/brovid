{% extends 'base.html' %}

{% block title %}Password Reset Complete - ShirtVerse{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body text-center">
                    <i class="bi bi-check-circle text-success" style="font-size: 4rem;"></i>
                    <h3 class="mt-3">Password Reset Complete</h3>
                    <p>Your password has been set. You can now log in with your new password.</p>
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary">Login Now</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
