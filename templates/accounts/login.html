{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - ShirtVerse{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0"><i class="bi bi-box-arrow-in-right"></i> Login</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <button type="submit" class="btn btn-primary w-100 mt-3">Login</button>
                    </form>
                    <hr>
                    <div class="text-center">
                        <a href="{% url 'accounts:password_reset' %}">Forgot Password?</a>
                    </div>
                </div>
                <div class="card-footer text-center">
                    Don't have an account? <a href="{% url 'accounts:register' %}">Register here</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
